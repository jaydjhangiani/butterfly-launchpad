name: Semgrep

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  semgrep:
    name: Semgrep SAST
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep
    steps:
      - uses: actions/checkout@v4
      - name: Run Semgrep
        run: semgrep --config=auto --error --json-output=semgrep.json src/ netlify/
      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-results
          path: semgrep.json
